trigger:
  branches:
    include:
      - main
      - gh-readonly-queue/*
  paths:
    include:
      - packer
    exclude:
      - infrastructure

pr:
  branches:
    include:
      - '*'
  paths:
    include:
      - packer
    exclude:
      - infrastructure

resources:
  repositories:
    - repository: templates
      type: github
      endpoint: Planning-Inspectorate
      name: Planning-Inspectorate/common-pipeline-templates
      ref: refs/tags/release/3.20.3

extends:
  template: pipelines/terraform_checks.yml@templates
  parameters:
    pool:
      name: pins-template-test
    workingDirectory: $(Build.Repository.LocalPath)/infrastructure
    tflintConfigPath: $(Build.Repository.LocalPath)/infrastructure/.tflint.hcl
